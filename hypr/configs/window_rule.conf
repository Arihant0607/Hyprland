# ─────────────────────────────
# 🔥 SMART GAMING (fullscreen optimization)
# ─────────────────────────────
# idleinhibit is gone; use hypridle or the new 'content' matchers
windowrule = match:fullscreen 1, no_blur on
windowrule = match:fullscreen 1, no_anim on
windowrule = match:fullscreen 1, immediate on

# ─────────────────────────────
# 🪟 FLOATING APPS
# ─────────────────────────────
# Syntax: windowrule = match:class <regex>, float on
windowrule = match:class ^(pavucontrol)$, float on
windowrule = match:class ^(nm-connection-editor)$, float on
windowrule = match:class ^(blueman-manager)$, float on
windowrule = match:class ^(org.kde.polkit-kde-authentication-agent-1)$, float on
windowrule = match:class ^(rofi)$, float on
windowrule = match:class ^(yad)$, float on
windowrule = match:class ^(gnome-system-monitor)$, float on
windowrule = match:class ^(eog)$, float on

# ─────────────────────────────
# ✨ OPACITY (Aesthetic)
# ─────────────────────────────
windowrule = match:class ^(kitty)$, opacity 0.92 0.75
windowrule = match:class ^(Spotify)$, opacity 0.92 0.75
windowrule = match:class ^(steam)$, opacity 0.92 0.75

# ─────────────────────────────
# 🎬 Picture-in-Picture
# ─────────────────────────────
windowrule = match:title ^(Picture-in-Picture)$, float on
windowrule = match:title ^(Picture-in-Picture)$, pin on
windowrule = match:title ^(Picture-in-Picture)$, size 25% 25%
windowrule = match:title ^(Picture-in-Picture)$, move 72% 7%
windowrule = match:title ^(Picture-in-Picture)$, opacity 1.0 1.0

# ─────────────────────────────
# 🎥 XWayland Video Bridge (Discord screen share fix)
# ─────────────────────────────
windowrule = match:class ^(xwaylandvideobridge)$, opacity 0.0 override
windowrule = match:class ^(xwaylandvideobridge)$, no_anim on
windowrule = match:class ^(xwaylandvideobridge)$, no_initial_focus on
windowrule = match:class ^(xwaylandvideobridge)$, max_size 1 1
windowrule = match:class ^(xwaylandvideobridge)$, no_blur on

blurls = waybar
